    <!-- JSON-LD Structured Data: WebSite schema (enables Google Sitelinks searchbox) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ImageGiri",
      "url": "https://imagegiri.com",
      "description": "A free, privacy-first suite of 14 browser-based tools and utilities. Compress, convert, edit, sign, and process files 100% offline without any cloud uploads.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://imagegiri.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
 
    <!-- JSON-LD Structured Data: SoftwareApplication schema (enables app-style rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ImageGiri",
      "url": "https://imagegiri.com",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Web Browser",
      "offers": {
        "@type": "Offer",
        "price": "0",

      "aggregateRating": {
        "@type": "AggregateRating",
